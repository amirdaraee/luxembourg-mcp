name: Live upstream tests

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run E2E tests against official upstream services
        run: python -m unittest tests.test_live_tools -v
        env:
          PYTHONPATH: src
          LUXEMBOURG_MCP_LIVE: "1"
